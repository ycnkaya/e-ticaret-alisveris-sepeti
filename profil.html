<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profilim - ShopHub</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <h1>🛒 ShopHub</h1>
          </div>

          <nav class="navbar">
            <ul>
              <li><a href="index.html" class="nav-link">Anasayfa</a></li>
              <li>
                <a href="profil.html" class="nav-link active">Profilim</a>
              </li>
              <li>
                <a href="siparis-gecmisi.html" class="nav-link">Siparişlerim</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="container">
        <section class="profile-section">
          <h2>👤 Profilim</h2>

          <div class="profile-container">
            <!-- Profil Bilgileri -->
            <div class="profile-info">
              <h3>Kişisel Bilgiler</h3>

              <div class="profile-form">
                <div class="form-group">
                  <label for="firstName">Ad:</label>
                  <input type="text" id="firstName" placeholder="Adınız" />
                </div>

                <div class="form-group">
                  <label for="lastName">Soyadı:</label>
                  <input type="text" id="lastName" placeholder="Soyadınız" />
                </div>

                <div class="form-group">
                  <label for="email">E-posta:</label>
                  <input
                    type="email"
                    id="email"
                    placeholder="email@example.com"
                  />
                </div>

                <div class="form-group">
                  <label for="phone">Telefon:</label>
                  <input type="tel" id="phone" placeholder="05551234567" />
                </div>

                <div class="form-group">
                  <label for="address">Adres:</label>
                  <textarea
                    id="address"
                    placeholder="Tam adresinizi giriniz"
                    rows="4"
                  ></textarea>
                </div>

                <button id="updateProfileBtn" class="btn btn-primary">
                  Profili Güncelle
                </button>
              </div>

              <p id="profileMessage" class="message"></p>
            </div>

            <!-- Sprint 2: İstatistikler -->
            <div class="profile-stats">
              <h3>📊 İstatistiklerim</h3>

              <div class="stat-box">
                <h4>Toplam Harcama</h4>
                <p id="totalSpent" class="stat-value">₺0.00</p>
              </div>

              <div class="stat-box">
                <h4>Sipariş Sayısı</h4>
                <p id="orderCount" class="stat-value">0</p>
              </div>

              <div class="stat-box">
                <h4>Ortalama Sipariş</h4>
                <p id="avgOrder" class="stat-value">₺0.00</p>
              </div>

              <div class="stat-box">
                <h4>Üyelik Tarihi</h4>
                <p id="joinDate" class="stat-value">-</p>
              </div>
            </div>
          </div>

          <div class="profile-actions">
            <button id="backBtn" class="btn btn-secondary">← Geri Dön</button>
          </div>
        </section>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="container">
        <p>&copy; 2024 ShopHub. Tüm hakları saklıdır.</p>
      </div>
    </footer>

    <script src="js/user.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/profil.js"></script>
  </body>
</html>
